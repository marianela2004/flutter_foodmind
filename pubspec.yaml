name: flutter_foodmind
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.0
  mobile_scanner: ^3.5.0
  flutter_local_notifications: ^17.0.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

# 🔹 ICONO DE LA APP (launcher)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"

  # fondo del icono (NO verde en tu caso)
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/icon.png"

# 🔹 PANTALLA DE ARRANQUE (splash)
flutter_native_splash:
  color: "#5e7e5e"
  image: assets/images/logo.png

  android_12:
    color: "#5e7e5e"
    image: assets/images/logo.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: MoreSugar
      fonts:
        - asset: assets/fonts/MoreSugar-Regular.ttf
        - asset: assets/fonts/MoreSugar-Extras.ttf
          weight: 700